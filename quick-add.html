<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Add to Board">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E3860">
<link rel="apple-touch-icon" href="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/Recp0AhyMh8lrtKJ9kaj/media/691b9707bb3d037e0ad689bf.png">
<title>Add to Stand-Up Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0E3860;
    --navy-dark:#092744;
    --bg:#F4F6F8;
    --border:#E2E8F0;
    --text:#1E293B;
    --text-muted:#64748B;
    --green:#15803D;
    --green-bg:#DCFCE7;
    --red:#DC2626;
    --accent:#0D9488;
    --accent-bg:#CCFBF1;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 55%,var(--navy-dark) 100%);color:var(--text);min-height:100vh;}
  .page{min-height:100vh;display:flex;justify-content:center;padding:0;}
  .wrap{max-width:480px;width:100%;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.25);}
  header{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);color:#fff;padding:28px 20px 34px;text-align:center;position:relative;}
  .logo-badge{display:inline-flex;align-items:center;background:#fff;border-radius:14px;padding:8px 16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(0,0,0,.18);}
  header img{height:36px;display:block;}
  header h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.2px;}
  header p{font-size:12.5px;color:rgba(255,255,255,.75);margin:6px 0 14px;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:11.5px;font-weight:700;padding:6px 13px;border-radius:999px;}
  .accent-strip{height:5px;background:linear-gradient(90deg,var(--accent),#5EEAD4,var(--navy));}
  main{padding:24px 20px 20px;background:#fff;border-radius:24px 24px 0 0;margin-top:-18px;position:relative;min-height:calc(100vh - 150px);}
  label{font-size:13px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin:18px 0 7px;}
  label:first-child{margin-top:0;}
  textarea,input,select{font-family:inherit;font-size:16px;padding:14px;border:1.5px solid var(--border);border-radius:12px;width:100%;background:#fff;color:var(--text);transition:border-color .15s,box-shadow .15s;}
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-bg);}
  textarea{min-height:110px;resize:vertical;}
  button{cursor:pointer;font-family:inherit;}
  button.primary{width:100%;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);color:#fff;border:none;padding:16px;border-radius:999px;font-size:16px;font-weight:800;margin-top:24px;min-height:54px;box-shadow:0 8px 20px rgba(14,56,96,.28);transition:transform .1s,box-shadow .1s;}
  button.primary:active{transform:scale(.98);box-shadow:0 4px 10px rgba(14,56,96,.28);}
  button.primary:disabled{opacity:.5;box-shadow:none;}
  .plus-icon{color:#5EEAD4;font-weight:900;margin-right:4px;}
  .hint{font-size:11.5px;color:var(--text-muted);margin-top:10px;text-align:center;}
  .success{display:none;text-align:center;padding:48px 20px 30px;}
  .success .check-circle{width:92px;height:92px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:46px;animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(.6);opacity:0;}70%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
  .success h2{color:var(--green);font-size:19px;margin:16px 0 4px;}
  .success p{color:var(--text-muted);font-size:13px;margin:0 0 26px;}
  .error{display:none;background:#FEE2E2;color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:14px;}
  button.secondary{width:100%;background:#fff;border:1.5px solid var(--navy);padding:14px;border-radius:999px;font-size:14px;font-weight:700;color:var(--navy);}
</style>
</head>
<body>
<div class="page">
<div class="wrap">
  <header>
    <span class="logo-badge"><img src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/Recp0AhyMh8lrtKJ9kaj/media/691b9707bb3d037e0ad689bf.png" alt="Caring Companions"></span>
    <h1>Add to Stand-Up Board</h1>
    <p>No login needed — this goes straight to the team</p>
    <span class="chip">⚡ Takes about 15 seconds</span>
  </header>
  <div class="accent-strip"></div>

  <main>
    <div id="formView">
      <label>📝 What happened</label>
      <textarea id="qa_summary" autofocus placeholder="e.g. A client's family called upset about Saturday's visit running late — nothing urgent, just wanted the team to know before Monday"></textarea>

      <label>🏷️ Category</label>
      <select id="qa_category">
        <option>Caregiver / Scheduling</option>
        <option>Client</option>
        <option>Lead</option>
        <option>Incident</option>
        <option selected>General</option>
      </select>

      <label>🙋 Related client/caregiver (optional)</label>
      <input id="qa_related_to" placeholder="Name, if it applies">

      <label>🏷️ Tag someone who needs to act on this (optional)</label>
      <input id="qa_assigned_to" placeholder="Name of the person who should follow up">

      <label>✍️ Your name</label>
      <input id="qa_reported_by" placeholder="So the team knows who to ask">

      <div class="error" id="qa_error"></div>
      <button class="primary" id="qa_submit" onclick="submitNote()"><span class="plus-icon">+</span> Add to Board</button>
      <div class="hint">Tip: add this page to your home screen for one-tap access next time.</div>
    </div>

    <div class="success" id="successView">
      <div class="check-circle">✅</div>
      <h2>Added to the board</h2>
      <p>The team will see this when they check Team Hub.</p>
      <button class="secondary" onclick="resetForm()">Add Another</button>
    </div>
  </main>
</div>
</div>

<script>
// Same Supabase project as the other hubs — but this page never signs in.
// It calls one narrow, insert-only function (submit_standup_note_public)
// that's granted to the anon role specifically for this purpose. See
// supabase_schema_team_hub.sql for exactly what that function can and can't do.
const SUPABASE_URL = 'https://zngsgedlsxinbygwmxwn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZ3NnZWRsc3hpbmJ5Z3dteHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDIzNDQsImV4cCI6MjA5ODExODM0NH0.L_31_UKdccyRH9n7p1GaBlZTqcJipB008H-GIvxwLxM';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Remember the name field on this device so it's a one-tap flow next time.
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('qa_reported_by');
  if(saved) document.getElementById('qa_reported_by').value = saved;
});

async function submitNote(){
  const summary = document.getElementById('qa_summary').value.trim();
  const errEl = document.getElementById('qa_error');
  errEl.style.display = 'none';
  if(!summary){
    errEl.textContent = 'Type what happened first.';
    errEl.style.display = 'block';
    return;
  }
  const reportedBy = document.getElementById('qa_reported_by').value.trim();
  const btn = document.getElementById('qa_submit');
  btn.disabled = true;
  btn.innerHTML = 'Adding…';

  try{
    const { error } = await sb.rpc('submit_standup_note_public', {
      p_summary: summary,
      p_category: document.getElementById('qa_category').value,
      p_related_to: document.getElementById('qa_related_to').value.trim(),
      p_reported_by: reportedBy,
      p_assigned_to: document.getElementById('qa_assigned_to').value.trim()
    });
    if(error) throw error;

    if(reportedBy) localStorage.setItem('qa_reported_by', reportedBy);
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
  }catch(e){
    errEl.textContent = "Couldn't save that — check your connection and try again.";
    errEl.style.display = 'block';
  }finally{
    btn.disabled = false;
    btn.innerHTML = '<span class="plus-icon">+</span> Add to Board';
  }
}
function resetForm(){
  document.getElementById('qa_summary').value = '';
  document.getElementById('qa_related_to').value = '';
  document.getElementById('qa_assigned_to').value = '';
  document.getElementById('qa_category').value = 'General';
  document.getElementById('successView').style.display = 'none';
  document.getElementById('formView').style.display = 'block';
  document.getElementById('qa_summary').focus();
}
</script>
</body>
</html>
